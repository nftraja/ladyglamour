<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LadyGlamour Wallet Deals</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:linear-gradient(135deg,#0b0b0b,#151515);
color:#fff;
padding:20px;
}

/* CARD */

.glass-card{
border-radius:18px;
padding:15px;
margin-bottom:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
}

/* TITLE */

.card-title{
font-size:14px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

/* DIVIDER */

.theme-divider-b{
height:1px;
margin:8px 0 14px;
background:linear-gradient(90deg,transparent,#ffffff80,transparent);
}

/* GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

/* DESKTOP */

@media(min-width:900px){
.product-grid{
grid-template-columns:repeat(6,1fr);
}
}

@media(min-width:1200px){
.product-grid{
grid-template-columns:repeat(8,1fr);
}
}

/* PRODUCT CARD */

.product-card{
background:#111;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
}

/* IMAGE */

.product-img{
width:100%;
aspect-ratio:1/1.25;
object-fit:cover;
display:block;
}

/* CAPTION */

.product-caption{
padding:10px;
text-align:center;
}

/* DISCOUNT */

.product-discount{
display:inline-block;
background:#ffd700;
color:#000;
font-size:11px;
font-weight:700;
padding:3px 6px;
border-radius:6px;
margin-bottom:6px;
}

/* PRICE */

.product-price{
font-size:14px;
font-weight:700;
color:#00ff88;
margin-bottom:6px;
}

/* BUTTON */

.view-btn{
display:inline-block;
padding:6px 12px;
font-size:12px;
border-radius:20px;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:#fff;
text-decoration:none;
}

</style>

</head>
