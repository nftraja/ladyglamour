<!doctype html>

<meta charset="UTF-8">

<title>LadyGlamour Discover</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:linear-gradient(135deg,#0b0b0b,#151515);
color:#fff;
padding:20px;
}


/* GLASS CARD */

.glass-card{
border-radius:18px;
padding:15px;
margin-bottom:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
}


/* TITLE */

.card-title{
font-size:15px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}


/* DIVIDER */

.theme-divider{
height:1px;
margin:10px 0 14px;
background:linear-gradient(90deg,transparent,#ffffff80,transparent);
}


/* PLATFORM GRID */

.platform-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media(min-width:800px){
.platform-grid{
grid-template-columns:repeat(4,1fr);
}
}


/* PLATFORM CARD */

.platform-card{
background:#111;
border-radius:14px;
padding:12px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
transition:.25s;
}

.platform-card:hover{
transform:translateY(-3px);
border-color:#ff4d88;
}


/* PLATFORM LOGO */

.platform-logo img{
width:40px;
height:40px;
margin-bottom:8px;
}


/* PLATFORM NAME */

.platform-name{
font-size:13px;
font-weight:600;
}

</style>
</head>
